name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # --- Client ---
      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Lint client
        working-directory: client
        run: npm run lint || true

      - name: Build client
        working-directory: client
        run: npm run build

      # --- Server ---
      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Verify server boots (syntax/require check)
        working-directory: server
        run: node -e "require('./src/app.js'); console.log('server app module loads cleanly')"

  trigger-deployment:
    needs: lint-and-build
    runs-on: ubuntu-latest
    # Only deploy on a real push to main, never on pull_request events
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
